# .github/workflows/update-ai-tools-ref.yml
#
# Scheduled workflow: Uses Claude Code to search for updates to the
# AI tools config paths reference document, then opens a PR with changes.
#
# Triggers:
#   - Weekly on Sundays at 08:00 UTC
#   - Manual via workflow_dispatch (with optional focus area)
#
# Prerequisites:
#   1. ANTHROPIC_API_KEY secret in repo Settings > Secrets
#   2. The reference doc at: ai-tools-config-paths.md (repo root)
#   3. GitHub App installed OR repo permissions for PR creation
#
# Cost estimate: ~$0.50-2.00 per run (Sonnet), depending on how many
# tools have changes. Runs ~4-5x/month = ~$5-10/month.

name: Update AI Tools Reference

on:
  schedule:
    - cron: '0 8 * * 0'    # Every Sunday at 08:00 UTC
  workflow_dispatch:
    inputs:
      focus:
        description: 'Focus area (e.g. "cursor", "claude code", "new tools", or "full")'
        required: false
        default: 'full'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-reference:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Determine focus area
        id: focus
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "area=${{ github.event.inputs.focus }}" >> $GITHUB_OUTPUT
          else
            echo "area=full" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code to update reference
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          FOCUS="${{ steps.focus.outputs.area }}"
          DATE=$(date -u +%Y-%m-%d)

          claude --print --dangerously-skip-permissions \
            --allowedTools 'Read,Write,Edit,WebFetch,Bash(grep:*),Bash(cat:*),Bash(wc:*),Bash(date:*),Bash(head:*),Bash(tail:*)' \
            -p "
          You are updating a living reference document that catalogs file structures,
          config paths, memory locations, temp/intermediate artifacts, ignore files,
          and naming conventions for all major AI coding tools.

          TODAY'S DATE: ${DATE}
          FOCUS AREA: ${FOCUS}

          ## Step 1: Read the current document
          Read the file: ai-tools-config-paths.md

          ## Step 2: Search for updates
          For each major tool in the document, search the web for:
          - Recent config path changes (2025-2026)
          - New features affecting file structure
          - New tools not yet in the document
          - Changes to AGENTS.md standard
          - New ignore file conventions

          If focus is 'full', check all tools. Otherwise focus on: ${FOCUS}

          ## Step 3: Update the document
          - Add a changelog entry at the very top (after the title), like:
            > **Changelog:** ${DATE} — [describe what changed]
          - Update any paths that have changed (mark old ones as DEPRECATED)
          - Add new tools or sections if warranted
          - Add new naming patterns or temp file locations if found
          - Do NOT remove existing content — mark deprecated items instead
          - Keep the existing document structure

          ## Step 4: Write a summary
          After editing, create a file called UPDATE_SUMMARY.md with:
          - What was added or changed
          - What was confirmed still current
          - What could not be verified

          Be thorough but conservative. Only change what you can verify.
          "

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet ai-tools-config-paths.md; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat ai-tools-config-paths.md
          fi

      - name: Create or update PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="auto/update-ai-tools-ref-${DATE}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch and commit
          git checkout -b "$BRANCH"
          git add ai-tools-config-paths.md
          git add UPDATE_SUMMARY.md 2>/dev/null || true
          git commit -m "docs: update AI tools reference (${DATE})

          Automated update via Claude Code scheduled workflow.
          Focus: ${{ steps.focus.outputs.area }}"

          git push origin "$BRANCH"

          # Check if there's already an open PR for this
          EXISTING_PR=$(gh pr list --head "auto/update-ai-tools-ref" --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            # Force-push to existing branch if same day, otherwise new PR
            gh pr comment "$EXISTING_PR" --body "Updated with new findings from ${DATE} run (focus: ${{ steps.focus.outputs.area }})"
          else
            # Read summary for PR body
            SUMMARY=""
            if [ -f UPDATE_SUMMARY.md ]; then
              SUMMARY=$(cat UPDATE_SUMMARY.md)
            fi

            gh pr create \
              --title "docs: AI tools reference update (${DATE})" \
              --body "## Automated AI Tools Reference Update

          **Date:** ${DATE}
          **Focus:** ${{ steps.focus.outputs.area }}
          **Triggered by:** ${{ github.event_name }}

          ---

          ${SUMMARY}

          ---

          > This PR was created automatically by the \`update-ai-tools-ref\` workflow.
          > Review the changes and merge if they look correct." \
              --label "documentation,automated"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Update AI Tools Reference" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ Changes detected and PR created/updated." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Diff stats:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git diff --stat HEAD~1 >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(see PR)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes needed — document is up to date." >> $GITHUB_STEP_SUMMARY
          fi
