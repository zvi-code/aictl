# TOKEN BUDGET TAB
# ═══════════════════════════════════════════════════════════════════

budget.live_token_usage:
  explanation: >
    Sparkline chart of estimated token consumption from live sessions
    over time.
  source: >
    Historical live_tokens values from metrics table, plotted as time
    series.
  source_type: aggregated
  unit: tokens
  update_freq: realtime
  tab: budget
  section: live_usage
  dynamic_source: true

budget.context_window.always_loaded:
  explanation: >
    Tokens from files always loaded into the context window on every
    LLM call. This is the guaranteed baseline context consumption.
  source: >
    compute_token_budget() classifies files: sent_to_llm="yes" AND
    loaded_when="every-call". Sums token estimates for matching files.
    Includes global scope + largest sub-project.
  source_type: deduced
  unit: tokens
  update_freq: on-discovery
  tab: budget
  section: context_window
  dynamic_source: false

budget.context_window.on_demand:
  explanation: >
    Tokens from files loaded on-demand. Not always in context but
    available when referenced.
  source: >
    Files where sent_to_llm="on-demand" OR loaded_when="on-demand".
    Summed token estimates.
  source_type: deduced
  unit: tokens
  update_freq: on-discovery
  tab: budget
  section: context_window
  dynamic_source: false

budget.context_window.conditional:
  explanation: >
    Tokens from files loaded conditionally based on project type or
    feature flags.
  source: >
    Files where sent_to_llm in ("conditional", "partial"). Summed
    token estimates.
  source_type: deduced
  unit: tokens
  update_freq: on-discovery
  tab: budget
  section: context_window
  dynamic_source: false

budget.context_window.cacheable:
  explanation: >
    Tokens from files marked as cacheable — can be served from prompt
    cache, reducing cost and latency.
  source: >
    Files where cacheable="yes" in paths-*.csv. These files benefit
    from prompt caching when the AI provider supports it.
  source_type: deduced
  unit: tokens
  update_freq: on-discovery
  tab: budget
  section: context_window
  dynamic_source: false

budget.context_window.percentage:
  explanation: >
    Current context window usage as percentage of detected model's
    maximum context length. Color-coded: green <50%, yellow <80%,
    orange >=80%.
  source: >
    (always_loaded_tokens / model_max_context) * 100.
    Model max context detected from tool telemetry model field.
    For max potential: sums all projects (not just largest).
  source_type: deduced
  unit: percent
  update_freq: on-discovery
  tab: budget
  section: context_window
  dynamic_source: false

budget.daily_tokens:
  explanation: >
    Stacked bar chart showing daily token consumption over the last 7
    consecutive days, broken down by AI model.
  source: >
    tool_telemetry table in DB, grouped by date and model. Each day's
    bar shows per-model segments (input + output + cache tokens).
    Color-coded by model.
  source_type: aggregated
  unit: tokens
  update_freq: on-collect
  tab: budget
  section: daily_chart
  dynamic_source: true

budget.token_by_tool:
  explanation: >
    Table showing token usage breakdown per AI tool: input, output,
    cache read, cache write, sessions, cost, and context split.
  source: >
    Latest tool_telemetry records per tool. Columns directly from
    telemetry parser output. Context split = visual bar showing
    token distribution within the tool's files.
  source_type: aggregated
  unit: tokens
  update_freq: on-collect
  tab: budget
  section: token_by_tool
  dynamic_source: true

budget.token_by_category:
  explanation: >
    Table showing token distribution by file category (instructions,
    config, rules, memory, etc.) with visual distribution bars.
  source: >
    Files grouped by category from paths-*.csv. Per category:
    file count, token sum, size sum, and proportional distribution bar.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: budget
  section: token_by_category
  dynamic_source: false

# ═══════════════════════════════════════════════════════════════════
# SESSIONS TAB
# ═══════════════════════════════════════════════════════════════════

sessions.timeline:
  explanation: >
    Gantt chart showing session durations on a timeline. Ended sessions
    appear as horizontal bars, live sessions as marker dots.
  source: >
    Session history from /api/session-timeline endpoint. Each session
    has start_time, end_time (or "live"), tool, and session_id.
    Rendered as lanes with time-proportional widths.
  source_type: raw
  unit: seconds
  update_freq: realtime
  tab: sessions
  section: timeline
  dynamic_source: true

sessions.agent_teams:
  explanation: >
    Agent team summaries showing multi-agent sessions. Displays team
    composition, per-agent token usage, model assignments, and
    completion status.
  source: >
    scan_agent_teams() reads subagent JSONL files at
    ~/.claude/projects/{project}/{session}/subagents/agent-*.jsonl.
    Per agent: input/output tokens from message.usage (cumulative),
    task (first user message, 200 chars), tools_used (from tool_use
    content blocks), completion (has final assistant message).
    Teams grouped by session.
  source_type: raw
  unit: tokens
  update_freq: on-collect
  tab: sessions
  section: agent_teams
  dynamic_source: true

sessions.active.duration:
  explanation: >
    How long the active session has been running (since root process
    was first observed).
  source: >
    now - session.started_at. started_at is set when SessionCorrelator
    first sees the root-candidate process.
  source_type: deduced
  unit: seconds
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.cpu:
  explanation: >
    Current CPU utilization across all processes in this session.
  source: >
    Sum of psutil cpu_percent for all PIDs in session.pids.
  source_type: aggregated
  unit: percent
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.input_tokens:
  explanation: >
    Input tokens consumed so far in this session.
  source: >
    session.exact_input_tokens if available from telemetry, otherwise
    estimated from session file inference or network inference.
  source_type: deduced
  unit: tokens
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.output_tokens:
  explanation: >
    Output tokens generated so far in this session.
  source: >
    session.exact_output_tokens if available from telemetry, otherwise
    estimated from session file inference or network inference.
  source_type: deduced
  unit: tokens
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.file_events:
  explanation: >
    Number of file system events observed during this session.
  source: >
    session.file_events counter, incremented on each file create/modify/
    delete detected by filesystem watching or state dir scanning.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.pids:
  explanation: >
    Number of OS process IDs belonging to this session.
  source: >
    len(session.pids). PIDs are added as child processes of the root
    process are discovered via ppid tracking.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.process_tree:
  explanation: >
    Hierarchical process tree showing parent-child relationships within
    the session. Processes are role-tagged: lead, teammate, subagent,
    subprocess.
  source: >
    Process tree built from ppid chains starting at root_pid. Roles
    assigned by process name pattern: "claude" → lead/teammate,
    agent patterns → subagent, everything else → subprocess.
    CPU and memory from psutil per process.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.history:
  explanation: >
    Table of past sessions with tool, session ID, duration, status,
    and end time.
  source: >
    events table filtered by kind="session-end" and "session-start".
    Duration = end_time - start_time. Status: "active" if no end
    event, "ended" otherwise.
  source_type: raw
  unit: seconds
  update_freq: on-collect
  tab: sessions
  section: history_table
  dynamic_source: true

