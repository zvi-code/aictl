# Datapoint Catalog — explains every metric shown in the aictl dashboard.
#
# Each entry has:
#   explanation:    What this datapoint represents (static, human-readable)
#   source:         How the value is collected or calculated
#   source_type:    raw | deduced | aggregated
#   unit:           tokens, bytes, percent, count, rate_bps, usd, seconds, ratio
#   update_freq:    realtime | on-collect | on-discovery | static
#   tab:            Which dashboard tab(s) show this (csv if multiple)
#   section:        Section within the tab
#   otel_metric:    Corresponding OTel metric name (if any)
#   dynamic_source: true if the source description gains detail as data arrives
#                   (e.g. "accumulated from 3 sessions" vs static definition)

# ═══════════════════════════════════════════════════════════════════
# OVERVIEW — SPARKLINES (top-level time series)
# ═══════════════════════════════════════════════════════════════════

overview.files:
  explanation: >
    Total number of configuration, instruction, and context files discovered
    across all monitored AI tools on disk. Counts files matching known path
    patterns from paths-unix.csv (or paths-windows.csv on Windows).
  source: >
    File discovery expands path templates from paths-*.csv using tool-specific
    root strategies (home dir, XDG config, project root). Each expanded path
    is checked for existence via os.stat(). The count is sum(len(tool.files))
    across all tools, excluding aictl's own files.
  source_type: aggregated
  unit: count
  update_freq: on-discovery
  tab: overview
  section: sparklines
  otel_metric: aictl.discovery.files
  dynamic_source: false

overview.tokens:
  explanation: >
    Total estimated tokens across all discovered AI tool files. Represents
    the cumulative context footprint — how many tokens the LLM ecosystem
    consumes on disk for instructions, memory, rules, and configuration.
  source: >
    Each file's token count is estimated as ceil(utf8_byte_length / 4),
    approximating BPE tokenization. Summed across all files for all tools.
    Formula: sum(ceil(len(content.encode('utf-8')) / 4)) for each file.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: overview
  section: sparklines
  otel_metric: aictl.discovery.tokens
  dynamic_source: false

overview.cpu:
  explanation: >
    Total CPU utilization across all monitored AI tool processes, expressed
    as a percentage where 100% = one full CPU core. A value of 400% means
    four cores are fully utilized by AI tools.
  source: >
    psutil.Process.cpu_percent() is called for each monitored process on
    every collection cycle (default 1.0s interval). Values are summed
    across all processes belonging to AI tools. Live correlator data is
    preferred; falls back to per-process discovery data if unavailable.
  source_type: aggregated
  unit: percent
  update_freq: realtime
  tab: overview
  section: sparklines
  otel_metric: process.cpu.utilization
  dynamic_source: false

overview.mem_mb:
  explanation: >
    Total resident memory (RSS) consumed by all monitored AI tool processes,
    in megabytes. Shows physical RAM footprint of the AI tool ecosystem.
  source: >
    psutil.Process.memory_info().rss is read for each monitored process.
    Values are summed across all AI tool processes and converted to MB
    (bytes / 1048576).
  source_type: aggregated
  unit: bytes
  update_freq: realtime
  tab: overview
  section: sparklines
  otel_metric: process.memory.usage
  dynamic_source: false

# ═══════════════════════════════════════════════════════════════════
# OVERVIEW — INVENTORY METRICS
# ═══════════════════════════════════════════════════════════════════

overview.total_processes:
  explanation: >
    Number of running OS processes attributed to AI tools. Includes IDE
    extensions, language servers, daemon processes, and CLI instances.
    Uses the higher of discovery count vs live PID count per tool.
  source: >
    Process discovery uses psutil.process_iter() and matches each process
    against ps_grep_pattern regexes from processes-*.csv. The count per
    tool is max(len(discovered_processes), live_pid_count_from_correlator).
    Summed across all tools.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: inventory
  otel_metric: aictl.discovery.processes
  dynamic_source: false

overview.total_size:
  explanation: >
    Total disk space consumed by all discovered AI tool files, in bytes.
    Includes configuration, memory, instructions, rules, and state files.
  source: >
    os.stat().st_size for each discovered file, summed across all tools.
    Only files matching path patterns from paths-*.csv are included.
  source_type: aggregated
  unit: bytes
  update_freq: on-discovery
  tab: overview
  section: inventory
  dynamic_source: false

overview.total_mcp_servers:
  explanation: >
    Count of unique MCP (Model Context Protocol) servers configured across
    all AI tools. MCP servers extend tool capabilities with external data
    sources, APIs, and integrations.
  source: >
    Parsed from tool configuration files (settings.json for Claude Code,
    mcp.json, .cursor/mcp.json, etc.). If detailed MCP status collection
    is available, uses len(mcp_detail); otherwise counts unique server
    names across all tool.mcp_servers lists.
  source_type: aggregated
  unit: count
  update_freq: on-collect
  tab: overview
  section: inventory
  otel_metric: aictl.discovery.mcp_servers
  dynamic_source: false

overview.total_memory_tokens:
  explanation: >
    Total estimated tokens across all agent memory/context files. These are
    persistent memory entries that AI tools load into their context window
    (e.g. Claude's CLAUDE.md, user memory files, Copilot instructions).
  source: >
    Memory files are discovered by scanning known paths (e.g.
    ~/.claude/memory/, ~/.claude/projects/*/memory/). Each file's content
    is token-estimated via ceil(utf8_bytes / 4). Summed across all entries.
  source_type: aggregated
  unit: tokens
  update_freq: on-collect
  tab: overview
  section: inventory
  otel_metric: aictl.memory.tokens
  dynamic_source: false

# ═══════════════════════════════════════════════════════════════════
# OVERVIEW — LIVE MONITOR METRICS
# ═══════════════════════════════════════════════════════════════════

overview.total_live_sessions:
  explanation: >
    Number of currently active AI tool sessions. A session represents a
    continuous interaction with an AI tool (e.g. an open Claude Code
    conversation, an active Copilot coding session).
  source: >
    The SessionCorrelator creates a SessionState when a root-candidate
    process is first observed. Sessions are considered active if seen
    within the last 180 seconds. Count is summed from
    tool.live.session_count across all tools with live data.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: live_monitor
  otel_metric: aictl.tool.sessions
  dynamic_source: true

overview.total_live_estimated_tokens:
  explanation: >
    Estimated tokens consumed across all active sessions. Combines exact
    telemetry (when available) with inference from network traffic and
    state file writes.
  source: >
    Token estimation uses a tiered approach:
    1. Exact telemetry (confidence 0.95) — from tool's native stats
       (e.g. Claude stats-cache.json, Copilot events.jsonl)
    2. Session file inference (confidence 0.60) — state_bytes_written
       * 0.6 / 4 for input, * 0.4 / 4 for output
    3. Network inference (confidence 0.40) — network_bytes * 0.7 / 4
    Sum of (input_tokens + output_tokens) across all active sessions.
  source_type: deduced
  unit: tokens
  update_freq: realtime
  tab: overview
  section: live_monitor
  otel_metric: aictl.tool.token.usage
  dynamic_source: true

overview.total_live_outbound_rate_bps:
  explanation: >
    Aggregate outbound (upload) network traffic rate across all active AI
    tool sessions, in bytes per second. Represents data being sent to AI
    APIs (prompts, code context, file contents).
  source: >
    Computed from per-session recent_network deque (last 24 samples).
    Rate = delta_bytes / delta_time over the sample window. Summed across
    all active tool sessions. Outbound = data sent to remote APIs.
  source_type: deduced
  unit: rate_bps
  update_freq: realtime
  tab: overview
  section: live_monitor
  otel_metric: aictl.tool.network.io
  dynamic_source: false

overview.total_live_inbound_rate_bps:
  explanation: >
    Aggregate inbound (download) network traffic rate across all active
    AI tool sessions, in bytes per second. Represents data received from
    AI APIs (completions, streaming responses).
  source: >
    Same computation as outbound rate but for receive direction. Computed
    from per-session recent_network deque, rate = delta_bytes / delta_time.
    Summed across all active tool sessions.
  source_type: deduced
  unit: rate_bps
  update_freq: realtime
  tab: overview
  section: live_monitor
  otel_metric: aictl.tool.network.io
  dynamic_source: false

overview.cpu_per_core:
  explanation: >
    Per-core CPU utilization for every logical CPU core on the system.
    Displayed as color-coded bars (red >80%, orange >50%, green >20%).
    Shows overall system load, not just AI tool processes.
  source: >
    psutil.cpu_percent(interval=0.1, percpu=True) returns a list of
    percentages, one per logical core. Called on every snapshot render.
  source_type: raw
  unit: percent
  update_freq: realtime
  tab: overview
  section: live_monitor
  otel_metric: system.cpu.utilization
  dynamic_source: false

# ═══════════════════════════════════════════════════════════════════
# OVERVIEW — RESOURCE BARS
# ═══════════════════════════════════════════════════════════════════

overview.csv_footprint_bar:
  explanation: >
    Stacked horizontal bar showing file count distribution per AI tool.
    Visualizes which tools have the largest on-disk configuration footprint.
  source: >
    len(tool.files) for each tool, rendered proportionally in a stacked bar.
    File counts from discovery (paths-*.csv expansion).
  source_type: aggregated
  unit: count
  update_freq: on-discovery
  tab: overview
  section: resource_bars
  dynamic_source: false

overview.live_traffic_bar:
  explanation: >
    Stacked horizontal bar showing network traffic distribution per tool.
    Visualizes which AI tools are consuming the most API bandwidth.
  source: >
    Per-tool outbound + inbound rate_bps from live correlator sessions.
    Tools without active sessions show zero width.
  source_type: aggregated
  unit: rate_bps
  update_freq: realtime
  tab: overview
  section: resource_bars
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# OVERVIEW — CONTEXT WINDOW MAP
# ═══════════════════════════════════════════════════════════════════

overview.context_map.sent_to_llm:
  explanation: >
    Tokens from files that are always sent to the LLM on every call.
    These consume context window capacity on every interaction and
    represent the baseline context load.
  source: >
    Files where sent_to_llm="yes" AND loaded_when="every-call" in
    paths-*.csv. Token count estimated per file, summed.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: overview
  section: context_map
  dynamic_source: false

overview.context_map.on_demand:
  explanation: >
    Tokens from files loaded on-demand (only when referenced or needed).
    These don't consume context by default but contribute when activated.
  source: >
    Files where sent_to_llm="on-demand" OR loaded_when="on-demand"
    in paths-*.csv. Token count estimated per file, summed.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: overview
  section: context_map
  dynamic_source: false

overview.context_map.conditional:
  explanation: >
    Tokens from files loaded conditionally (e.g. only in certain project
    types or when specific features are enabled).
  source: >
    Files where sent_to_llm in ("conditional", "partial") in paths-*.csv.
    Token count estimated per file, summed.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: overview
  section: context_map
  dynamic_source: false

overview.context_map.not_sent:
  explanation: >
    Tokens from files that exist on disk but are never sent to the LLM.
    Configuration, state, and metadata files that the tool uses internally.
  source: >
    Files where sent_to_llm="no" in paths-*.csv. Token count estimated
    per file, summed.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: overview
  section: context_map
  dynamic_source: false

overview.context_map.by_category:
  explanation: >
    Token distribution broken down by file category (instructions, config,
    rules, memory, state, etc.). Shows which category of files contributes
    most to context window usage.
  source: >
    Files grouped by their 'category' field from paths-*.csv. Token count
    per category = sum of per-file estimates within the category.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: overview
  section: context_map
  dynamic_source: false

overview.context_map.by_project:
  explanation: >
    Token distribution broken down by project. Shows how context budget
    is split across different working directories/repositories.
  source: >
    Files grouped by resolved project root (git root or parent directory).
    Each project's tokens = sum of file estimates within that project scope.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: overview
  section: context_map
  dynamic_source: false

# ═══════════════════════════════════════════════════════════════════
# OVERVIEW — COLLECTOR HEALTH
# ═══════════════════════════════════════════════════════════════════

overview.collector_health.tools_with_telemetry:
  explanation: >
    Count of AI tools that have verified telemetry data (token usage from
    the tool's native stats) vs total tools discovered.
  source: >
    Counts tools where tool_telemetry[].source is non-empty and
    confidence > 0. Format: "N/M tools with telemetry".
  source_type: aggregated
  unit: count
  update_freq: on-collect
  tab: overview
  section: collector_health
  dynamic_source: true

overview.collector_health.live_tools:
  explanation: >
    Count of tools with active live monitoring (running sessions detected).
  source: >
    Count of tools where tool.live is not None/empty.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

overview.collector_health.stale_tools:
  explanation: >
    Count of tools whose telemetry data is stale (last seen timestamp
    exceeds freshness threshold). Indicates potential collection failures.
  source: >
    Tools where (now - last_seen) > staleness threshold. Last_seen comes
    from the most recent telemetry or live sample timestamp.
  source_type: deduced
  unit: count
  update_freq: on-collect
  tab: overview
  section: collector_health
  dynamic_source: true

overview.collector_health.errors:
  explanation: >
    Count of tools with telemetry collection errors (parse failures,
    missing files, permission errors, timeout errors).
  source: >
    Accumulated from telemetry parser error lists. Each parser reports
    errors encountered while reading stats files or event logs.
  source_type: aggregated
  unit: count
  update_freq: on-collect
  tab: overview
  section: collector_health
  dynamic_source: true

overview.collector_health.otel_status:
  explanation: >
    Whether the OpenTelemetry receiver is active and receiving metrics/logs.
  source: >
    Boolean from otel_receiver module. Active if any metrics or logs have
    been received via /v1/metrics or /v1/logs endpoints.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  otel_metric: aictl.collector.status
  dynamic_source: true

overview.collector_health.otel_metrics_received:
  explanation: >
    Total count of OTLP metric data points received by the built-in
    OpenTelemetry receiver since startup.
  source: >
    Counter incremented on each POST to /v1/metrics endpoint. Counts
    individual metric data points within OTLP JSON payloads.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# PROCESSES TAB — PER-TOOL OVERVIEW CARDS
# ═══════════════════════════════════════════════════════════════════

procs.tool.files:
  explanation: >
    Number of on-disk files belonging to this specific AI tool, matching
    path patterns from paths-*.csv.
  source: >
    len(tool.files) after discovery expansion. Each file was verified to
    exist on disk via os.stat().
  source_type: raw
  unit: count
  update_freq: on-discovery
  tab: procs
  section: tool_card
  dynamic_source: false

procs.tool.tokens:
  explanation: >
    Total estimated tokens across all files belonging to this tool.
  source: >
    Sum of ceil(utf8_bytes / 4) for each file in tool.files.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: procs
  section: tool_card
  dynamic_source: false

procs.tool.process_count:
  explanation: >
    Number of running OS processes attributed to this tool.
  source: >
    Process matching via ps_grep_pattern regex from processes-*.csv
    against psutil.process_iter() results. Includes parent and child
    processes within the process tree.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: procs
  section: tool_card
  otel_metric: aictl.discovery.processes
  dynamic_source: false

procs.tool.cpu_pct:
  explanation: >
    CPU utilization for a single process, as percentage of one core.
    Color-coded: orange >5%, red if anomaly detected.
  source: >
    psutil.Process.cpu_percent(None) / 100 for the specific PID.
    Updated on each collection cycle.
  source_type: raw
  unit: percent
  update_freq: realtime
  tab: procs
  section: process_row
  otel_metric: process.cpu.utilization
  dynamic_source: false

procs.tool.mem_rss:
  explanation: >
    Resident memory (RSS) for a single process. Shown as a visual bar
    relative to the maximum memory across all processes in the group.
  source: >
    psutil.Process.memory_info().rss in bytes. Visual bar width =
    this_process_mem / max_process_mem_in_group.
  source_type: raw
  unit: bytes
  update_freq: realtime
  tab: procs
  section: process_row
  otel_metric: process.memory.usage
  dynamic_source: false

procs.tool.zombie_risk:
  explanation: >
    Risk level that this process may become a zombie (orphaned, not
    properly cleaned up). Based on known patterns from processes-*.csv.
  source: >
    Static classification from processes-*.csv zombie_risk column
    (none, low, medium, high). Based on historical analysis of each
    process type's lifecycle behavior.
  source_type: raw
  unit: count
  update_freq: static
  tab: procs
  section: process_row
  dynamic_source: false

procs.tool.anomaly:
  explanation: >
    Process anomaly detection — unusual resource consumption, unexpected
    state, or known problematic patterns.
  source: >
    Anomaly rules applied per process: memory exceeding known thresholds
    (memory_active_mb from CSV), CPU spikes, known leak patterns
    (known_leak + leak_pattern from CSV), orphan detection.
  source_type: deduced
  unit: count
  update_freq: realtime
  tab: procs
  section: process_row
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# PROCESSES TAB — TOOL CARD SECTIONS
# ═══════════════════════════════════════════════════════════════════

procs.tool.config.model:
  explanation: >
    The AI model currently configured for this tool (e.g. claude-sonnet-4-5-20250514,
    gpt-4o). Extracted from the tool's settings file.
  source: >
    Parsed from tool config files defined in tool-configs.yaml. For
    Claude Code: settings.json → selectedModel. For Cursor: state.vscdb
    SQLite. For Copilot: settings.json model preferences.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_config
  otel_metric: aictl.config.model
  dynamic_source: false

procs.tool.config.otel:
  explanation: >
    Whether OpenTelemetry export is enabled for this tool, and the
    configured exporter type and endpoint.
  source: >
    Parsed from tool config files. Looks for OTel-related settings
    (exporter, endpoint, protocol) in the tool's configuration.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_config
  dynamic_source: false

procs.tool.config.features:
  explanation: >
    Feature flags and settings extracted from the tool's configuration.
    Shows which capabilities are enabled/disabled.
  source: >
    Parsed from tool config files per tool-configs.yaml feature
    extraction rules. Boolean and string values presented as badges.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_config
  dynamic_source: false

procs.tool.config.mcp_servers:
  explanation: >
    MCP servers configured in this tool's settings. Lists server names
    as pills.
  source: >
    Parsed from tool MCP config (e.g. Claude Code's
    ~/.claude/settings.json mcpServers, or project .mcp.json files).
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_config
  dynamic_source: false

# ═══════════════════════════════════════════════════════════════════
# PROCESSES TAB — TELEMETRY SECTION
# ═══════════════════════════════════════════════════════════════════

procs.tool.telemetry.input_tokens:
  explanation: >
    Lifetime input tokens consumed by this tool — total tokens sent to
    the LLM across all sessions. Verified from the tool's native stats.
  source: >
    Tool-specific parser reads the tool's stats/telemetry file:
    - Claude Code: ~/.claude/stats-cache.json → costTracker.totalInputTokens
    - Copilot CLI: events.jsonl → session.shutdown → modelMetrics.*.usage.inputTokens
    - Codex CLI: session.json → usage.input_tokens
    - Cursor: state.vscdb SQLite → keys matching %token%
    - Continue: sessions/*.json → usage.promptTokens
  source_type: raw
  unit: tokens
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  otel_metric: gen_ai.client.token.usage.verified
  dynamic_source: true

procs.tool.telemetry.output_tokens:
  explanation: >
    Lifetime output tokens generated by this tool — total tokens received
    from the LLM across all sessions.
  source: >
    Same tool-specific parsers as input_tokens, reading the output
    counterpart field from each tool's native stats format.
  source_type: raw
  unit: tokens
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  otel_metric: gen_ai.client.token.usage.verified
  dynamic_source: true

procs.tool.telemetry.cache_read:
  explanation: >
    Lifetime cache-read tokens — tokens retrieved from prompt cache
    instead of re-processing. Reduces cost and latency.
  source: >
    From tool stats: costTracker.totalCacheReadTokens (Claude Code),
    modelMetrics.*.usage.cacheReadTokens (Copilot), etc.
  source_type: raw
  unit: tokens
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

procs.tool.telemetry.cache_write:
  explanation: >
    Lifetime cache-creation tokens — tokens written to prompt cache
    for future reuse. Initial investment for cache read savings.
  source: >
    From tool stats: costTracker.totalCacheCreationTokens (Claude Code),
    cacheWriteTokens (Copilot), cached_input_tokens (Codex), etc.
  source_type: raw
  unit: tokens
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

procs.tool.telemetry.sessions:
  explanation: >
    Total number of sessions recorded by this tool's telemetry.
  source: >
    From tool stats: costTracker.totalSessions (Claude Code), count of
    session.shutdown events (Copilot), count of session files (Codex).
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  otel_metric: aictl.telemetry.sessions
  dynamic_source: true

procs.tool.telemetry.messages:
  explanation: >
    Total number of messages (user+assistant turns) across all sessions.
  source: >
    From tool stats: costTracker.totalMessages (Claude Code). Not all
    tools expose message counts.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  otel_metric: aictl.telemetry.messages
  dynamic_source: true

procs.tool.telemetry.cost_usd:
  explanation: >
    Estimated total cost in USD across all sessions for this tool.
    Based on the tool's own cost tracking, not recalculated by aictl.
  source: >
    From tool stats: costTracker.totalCostUSD (Claude Code),
    modelMetrics.*.requests.cost (Copilot), usage.cost_usd (Codex).
    Passed through from tool's native calculation.
  source_type: raw
  unit: usd
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  otel_metric: aictl.telemetry.cost
  dynamic_source: true

procs.tool.telemetry.by_model:
  explanation: >
    Token usage and cost broken down by AI model. Shows which models
    are consuming resources (e.g. claude-sonnet-4-5-20250514 vs claude-haiku).
  source: >
    From tool stats: costTracker.byModel (Claude Code) with per-model
    inputTokens, outputTokens, costUSD. Copilot: per-model breakdown
    in modelMetrics. Stored as JSON dict {model: {input, output, cost}}.
  source_type: raw
  unit: tokens
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

procs.tool.telemetry.confidence:
  explanation: >
    Confidence score (0-100%) for the telemetry data accuracy. Higher
    confidence means the data comes from a more reliable source.
  source: >
    Set by each parser:
    - 0.95 (95%): Direct tool stats (Claude stats-cache, OTel spans)
    - 0.90 (90%): Copilot events.jsonl shutdown events
    - 0.85 (85%): Codex session.json
    - 0.75 (75%): Continue session files
    - 0.70 (70%): Cursor SQLite state
    - 0.60 (60%): Session file inference
    - 0.40 (40%): Network traffic inference
  source_type: raw
  unit: ratio
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  otel_metric: gen_ai.client.confidence
  dynamic_source: false

procs.tool.telemetry.errors:
  explanation: >
    Errors encountered while collecting telemetry for this tool. Includes
    parse errors, missing files, permission issues, and API timeouts.
  source: >
    Accumulated during telemetry parsing. Each parser catches exceptions
    and records error type + message. Copilot-specific: timeout detection
    if avg API latency > 30s/request.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# PROCESSES TAB — LIVE MONITOR SECTION (per tool card)
# ═══════════════════════════════════════════════════════════════════

procs.tool.live.session_count:
  explanation: >
    Number of active sessions for this specific tool.
  source: >
    Count of SessionState objects for this tool where last_seen is
    within 180s. From SessionCorrelator tool aggregation.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: procs
  section: tool_live
  otel_metric: aictl.tool.sessions
  dynamic_source: true

procs.tool.live.pid_count:
  explanation: >
    Number of OS process IDs attributed to this tool's active sessions.
  source: >
    Union of all pids across SessionState objects for this tool.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: procs
  section: tool_live
  otel_metric: aictl.tool.pids
  dynamic_source: true

procs.tool.live.traffic:
  explanation: >
    Network traffic rates (upload/download) for this tool's active sessions.
  source: >
    Computed from per-session recent_network deque (last 24 samples at 1s
    intervals). Rate = delta_bytes / delta_time. Summed across sessions.
  source_type: deduced
  unit: rate_bps
  update_freq: realtime
  tab: procs
  section: tool_live
  otel_metric: aictl.tool.network.io
  dynamic_source: true

procs.tool.live.tokens:
  explanation: >
    Estimated tokens for this tool's active sessions, with confidence
    level indicating estimation method used.
  source: >
    Tiered estimation: exact telemetry (0.95) > session file inference
    (0.60) > network inference (0.40). Source and confidence displayed
    alongside the value.
  source_type: deduced
  unit: tokens
  update_freq: realtime
  tab: procs
  section: tool_live
  otel_metric: aictl.tool.token.usage
  dynamic_source: true

procs.tool.live.mcp_detected:
  explanation: >
    Whether MCP (Model Context Protocol) loop activity is detected for
    this tool, and estimated number of tool-use loops.
  source: >
    Heuristic MCP loop detection analyzing 24-sample windows:
    - Network bursts >32KB → min(0.45, count * 0.15)
    - CPU spikes >20% → min(0.30, count * 0.10)
    - Subprocess invocations (git, rg, bash) → min(0.35, count * 0.08)
    - Correlation bonus +0.15 if CPU AND network active
    Detected if combined score >= 0.45.
    Loop count estimate = max(0, network_peaks // 2).
  source_type: deduced
  unit: count
  update_freq: realtime
  tab: procs
  section: tool_live
  otel_metric: aictl.tool.mcp.score
  dynamic_source: true

procs.tool.live.files_touched:
  explanation: >
    Number of unique files touched (created/modified/deleted) during
    this tool's active sessions.
  source: >
    Set union of files_touched across all sessions for this tool.
    File events detected by filesystem watching or state dir scanning.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: procs
  section: tool_live
  dynamic_source: true

procs.tool.live.cpu:
  explanation: >
    Current CPU utilization and peak CPU seen during this tool's
    active sessions.
  source: >
    Sum of cpu_percent across sessions (current). Max of peak_cpu_percent
    across sessions (peak). From SessionCorrelator aggregation.
  source_type: aggregated
  unit: percent
  update_freq: realtime
  tab: procs
  section: tool_live
  otel_metric: aictl.tool.cpu
  dynamic_source: true

procs.tool.live.workspaces:
  explanation: >
    Working directories (project roots) associated with this tool's
    active sessions.
  source: >
    Set union of session.workspaces, derived from the cwd of root
    processes. Resolved to git repository roots when possible.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: procs
  section: tool_live
  dynamic_source: true

