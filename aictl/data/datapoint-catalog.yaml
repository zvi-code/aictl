    itself via on_collector_status(source=name, ...).
  source_type: raw
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_pipeline
  dynamic_source: true

overview.collector_pipeline.status:
  explanation: >
    Health status of each collector — active (green), degraded (orange),
