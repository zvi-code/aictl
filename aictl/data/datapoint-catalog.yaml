live.diagnostics.status:
  explanation: >
    Current status of each collector — active, degraded, disabled, or
    unknown.
  source: >
    Direct assignment from the status parameter in
    SessionCorrelator.on_collector_status(). Updated on each collector
    cycle.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: live
  section: collector_health
  dynamic_source: true

live.diagnostics.mode:
  explanation: >
    Operating mode of each collector (e.g. polling, watching, passive).
  source: >
    Direct assignment from the mode parameter in
    SessionCorrelator.on_collector_status().
  source_type: raw
  unit: count
  update_freq: realtime
  tab: live
  section: collector_health
  dynamic_source: true

