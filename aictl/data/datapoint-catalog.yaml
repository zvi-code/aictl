  source_type: raw
  unit: count
  update_freq: realtime
  tab: procs
  section: process_row
  dynamic_source: false

# ═══════════════════════════════════════════════════════════════════
# OTEL RECEIVER STATS (CollectorHealth.js)
# ═══════════════════════════════════════════════════════════════════

overview.collector_health.otel_events_received:
  explanation: >
    Total count of OTLP log/event data points received by the built-in
    OpenTelemetry receiver since startup.
  source: >
    Counter incremented in OtelStats on each POST to /v1/logs endpoint.
    Counts individual log records within OTLP JSON payloads.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

overview.collector_health.otel_api_calls:
  explanation: >
    Total count of API call events received via OpenTelemetry. These
    are gen_ai spans tracking individual LLM API requests.
  source: >
    Counter in OtelStats incremented for events matching
    API_REQUEST_EVENTS frozenset (gen_ai.request, llm.call, etc.).
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

overview.collector_health.otel_api_errors:
  explanation: >
    Total count of API error events received via OpenTelemetry.
  source: >
    Counter in OtelStats incremented for events matching
    API_ERROR_EVENTS frozenset (gen_ai.error, llm.error, etc.).
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

overview.collector_health.otel_parse_errors:
  explanation: >
    Number of errors encountered while parsing incoming OTLP payloads.
  source: >
    OtelStats.errors counter, incremented on JSON parse failures or
    schema validation errors in the /v1/metrics and /v1/logs handlers.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

overview.collector_health.otel_last_receive:
  explanation: >
    Time since the last OTLP payload was received. Shows data freshness.
  source: >
    OtelStats timestamp set to time.time() on each successful parse of
    metrics or logs. Displayed as relative time (e.g. "3s ago").
  source_type: raw
  unit: seconds
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

