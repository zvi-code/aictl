# ═══════════════════════════════════════════════════════════════════
# ANOMALY ALERTS (banner)
# ═══════════════════════════════════════════════════════════════════

alerts.subagent_memory:
  explanation: >
    Alert triggered when total memory consumption by AI tool subagent
    processes exceeds 2GB. Indicates potential memory leak or runaway
    agent.
  source: >
    Sum of psutil.Process.memory_info().rss for all processes classified
    as subagents or child processes. Threshold: 2 * 1024^3 bytes.
  source_type: deduced
  unit: bytes
  update_freq: realtime
  tab: overview
  section: alerts
  dynamic_source: true

alerts.orphan_mcp:
  explanation: >
    Count of MCP server processes whose parent process has died. These
    orphans consume resources but are no longer useful.
  source: >
    MCP server processes where the expected parent AI tool process is
    no longer running (ppid check fails or parent PID not in active
    session PIDs).
  source_type: deduced
  unit: count
  update_freq: realtime
  tab: overview
  section: alerts
  dynamic_source: true

alerts.headless_browser:
  explanation: >
    Count of headless browser processes (Chrome, Chromium, Firefox)
    spawned by AI tools. These are resource-heavy and may indicate
    tool-use loops or web scraping.
  source: >
    Process matching against browser process name patterns in the
    process tree of AI tool sessions.
  source_type: deduced
  unit: count
  update_freq: realtime
  tab: overview
  section: alerts
  dynamic_source: true

alerts.process_anomalies:
  explanation: >
    Total count of process-level anomalies across all AI tools.
    Aggregates memory leaks, CPU spikes, zombie processes, and
    other unusual behavior.
  source: >
    Sum of anomaly counts from all tool process inspections. Each
    anomaly type has its own detection rule (see procs.tool.anomaly).
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: alerts
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# FILE TREE (within tool cards)
# ═══════════════════════════════════════════════════════════════════

files.category.count:
  explanation: >
    Number of files in a specific category (instructions, config,
    rules, memory, state, etc.) for a tool.
  source: >
    Files grouped by category field from paths-*.csv. Count per
    category per tool.
  source_type: aggregated
  unit: count
  update_freq: on-discovery
  tab: procs
  section: file_tree
  dynamic_source: false

files.category.tokens:
  explanation: >
    Total tokens for all files in a category for a tool.
  source: >
    Sum of per-file token estimates within the category.
  source_type: aggregated
  unit: tokens
  update_freq: on-discovery
  tab: procs
  section: file_tree
  dynamic_source: false

files.item.sent_to_llm:
  explanation: >
    Whether this file is sent to the LLM and under what conditions.
    Diamond = always, diamond-outline = on-demand, circle = conditional/no.
  source: >
    sent_to_llm field from paths-*.csv for this file's path pattern.
    Values: "yes", "on-demand", "conditional", "partial", "no".
  source_type: raw
  unit: count
  update_freq: static
  tab: procs
  section: file_tree
  dynamic_source: false

files.item.activity:
  explanation: >
    File activity indicator — green pulse (actively changing), orange
    (recently modified), grey (inactive).
  source: >
    Based on file mtime: green if changed since last collection cycle,
    orange if mtime within 300s, grey otherwise. Pulsing animation for
    live-active files.
  source_type: deduced
  unit: count
  update_freq: on-collect
  tab: procs
  section: file_tree
  dynamic_source: true

files.item.tokens:
  explanation: >
    Estimated token count for a single file.
  source: >
    ceil(len(content.encode('utf-8')) / 4).
  source_type: deduced
  unit: tokens
  update_freq: on-collect
  tab: procs
  section: file_tree
  otel_metric: aictl.file.tokens
  dynamic_source: false

files.item.size:
  explanation: >
    File size in bytes from the filesystem.
  source: >
    os.stat(path).st_size.
  source_type: raw
  unit: bytes
  update_freq: on-collect
  tab: procs
  section: file_tree
  otel_metric: aictl.file.bytes
  dynamic_source: false

files.item.lines:
  explanation: >
    Estimated line count for a file.
  source: >
    Estimated from file size when content is not loaded, otherwise
    content.count('\\n') + 1.
  source_type: deduced
  unit: count
  update_freq: on-collect
  tab: procs
  section: file_tree
  dynamic_source: false

# ═══════════════════════════════════════════════════════════════════
# TELEMETRY — OPERATIONAL / QUOTA METRICS (ToolCardSections.js)
# ═══════════════════════════════════════════════════════════════════

procs.tool.telemetry.premium_requests:
  explanation: >
    Number of premium API requests used (Copilot CLI). Tracks quota
    consumption for rate-limited plans.
  source: >
    Accumulated from session.shutdown events in Copilot CLI events.jsonl.
    Field: totalPremiumRequests. Summed across all shutdown events.
  source_type: aggregated
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

procs.tool.telemetry.api_duration_ms:
  explanation: >
    Total API duration in milliseconds across all sessions. Used to
    detect timeout patterns (avg > 30s flags potential issue).
  source: >
    Accumulated from session.shutdown events in Copilot CLI events.jsonl.
    Field: totalApiDurationMs. If avg per request > 30000ms, flagged as
    timeout error.
  source_type: aggregated
  unit: seconds
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

procs.tool.telemetry.code_changes:
  explanation: >
    Code changes made during tool sessions — lines added, lines removed,
    files modified. Shows the tool's impact on the codebase.
  source: >
    From Copilot CLI session.shutdown event's codeChanges object:
    linesAdded (int), linesRemoved (int), filesModified (array length).
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

procs.tool.telemetry.active_session_input:
  explanation: >
    Input tokens consumed in the currently active session (not lifetime).
    Shows real-time token usage of the ongoing conversation.
  source: >
    Claude Code: sum of usage.input_tokens from recent JSONL lines
    (last 500 lines of active session file). Copilot: from latest
    session state.
  source_type: aggregated
  unit: tokens
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

procs.tool.telemetry.active_session_output:
  explanation: >
    Output tokens generated in the currently active session (not lifetime).
  source: >
    Same as active_session_input but reading usage.output_tokens from
    recent JSONL lines of the active session.
  source_type: aggregated
  unit: tokens
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

procs.tool.telemetry.active_session_messages:
  explanation: >
    Number of messages (turns) in the currently active session.
  source: >
    Count of assistant messages with usage data in the active session
    JSONL file.
  source_type: aggregated
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_telemetry
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# TOOL CONFIG DETAILS (ToolCardSections.js)
# ═══════════════════════════════════════════════════════════════════

procs.tool.config.launch_at_startup:
  explanation: >
    Whether the tool is configured to launch automatically at system
    startup (login items on macOS, autostart on Linux).
  source: >
    macOS: detected via osascript querying login items or launchd plist.
    Linux: checks XDG autostart directory. Windows: checks startup folder.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_config
  dynamic_source: false

procs.tool.config.auto_update:
  explanation: >
    Whether automatic updates are enabled for the tool.
  source: >
    Claude Code: ~/.claude.json autoUpdates field. Other tools: from
    respective settings files per tool-configs.yaml.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_config
  dynamic_source: false

procs.tool.config.otel_capture_content:
  explanation: >
    Whether OpenTelemetry is configured to capture message content
    (prompts and responses). Warning shown if enabled due to privacy.
  source: >
    From tool OTel config: captureContent or capture_content field in
    VS Code settings or tool-specific config files.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_config
  dynamic_source: false

procs.tool.config.extensions:
  explanation: >
    IDE extensions installed for this tool (e.g. VS Code extensions
    related to the AI tool).
  source: >
    Enumeration of ~/.vscode/extensions directories matching known
    patterns for the tool. Also from VS Code extensions list.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_config
  dynamic_source: false

procs.tool.config.hints:
  explanation: >
    Actionable suggestions generated from analyzing the tool's current
    configuration. Warnings about suboptimal settings, missing features,
    or security concerns.
  source: >
    Generated by _generate_hints() in tool_config.py based on OTel
    config state, feature flags, and tool settings analysis.
  source_type: deduced
  unit: count
  update_freq: on-collect
  tab: procs
  section: tool_config
  dynamic_source: false

# ═══════════════════════════════════════════════════════════════════
# COLLECTOR DIAGNOSTICS (TabLive.js)
