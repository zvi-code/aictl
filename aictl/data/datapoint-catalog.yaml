sessions.agent_teams.agent_slug:
  explanation: >
    Short identifier/slug for each agent in a team (e.g. "Explore",
    "test-runner", "Plan").
  source: >
    Direct read from first JSONL line's slug field in agent-*.jsonl.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: sessions
  section: agent_teams
  dynamic_source: true

sessions.agent_teams.agent_is_sidechain:
  explanation: >
    Whether an agent runs as a sidechain (isolated worktree) vs main
    chain. Sidechain agents work in parallel on separate branches.
  source: >
    Direct read from first JSONL line's isSidechain boolean field
    in agent-*.jsonl.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: sessions
  section: agent_teams
  dynamic_source: true

sessions.agent_teams.warmup_count:
  explanation: >
    Number of warmup agents in a team — agents that were spawned but
