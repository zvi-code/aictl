  source: >
    Direct from collector status reporting. Color-coded by status value
    in the UI. Left border indicates health.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_pipeline
  dynamic_source: true

overview.collector_pipeline.detail:
  explanation: >
    Additional detail text for each collector's status (e.g. sample
    count, error message, collection interval).
  source: >
    Free-text detail from collector status reporting via
    on_collector_status(detail=...).
  source_type: raw
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_pipeline
  dynamic_source: true

