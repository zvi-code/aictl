  section: tool_sessions
  dynamic_source: true

live.tool.traffic:
  explanation: >
    Upload (outbound) and download (inbound) rates for a tool,
    formatted as bytes/second.
  source: >
    Rates computed from SessionCorrelator recent_network deque.
    Rate = bytes_delta / time_delta over 24-sample sliding window.
  source_type: deduced
  unit: rate_bps
  update_freq: realtime
  tab: live
  section: tool_sessions
  dynamic_source: true

live.tool.tokens:
  explanation: >
    Estimated tokens with source identification and confidence score.
    Shows which estimation method was used (exact, session-file, network).
  source: >
    Tiered token estimation — see overview.total_live_estimated_tokens.
    Source text identifies the method (e.g. "stats-cache", "session-files",
    "network-infer"). Confidence percentage shown alongside.
  source_type: deduced
  unit: tokens
  update_freq: realtime
