  unit: count
  update_freq: realtime
  tab: live
  section: tool_sessions
  dynamic_source: true

live.tool.files:
  explanation: >
    Files touched and file events during the live session.
  source: >
    files_touched = count of unique file paths modified.
    file_events = total count of file system events observed.
