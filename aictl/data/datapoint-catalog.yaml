  source_type: deduced
  unit: rate_bps
  update_freq: realtime
  tab: events
  section: tool_live
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# SESSION TIMELINE TOOLTIP (TabSessions.js)
# ═══════════════════════════════════════════════════════════════════

sessions.timeline.conversations:
  explanation: >
    Number of conversation JSONL files found for this session. Each
    file represents a distinct conversation thread.
  source: >
    Count of .jsonl files in ~/.claude/projects/{project}/ matching
    the session. From query_session_profiles().
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: sessions
  section: timeline
  dynamic_source: true

sessions.timeline.subagents:
  explanation: >
    Number of subagent files found for this session. Indicates how
    many parallel agents were spawned.
  source: >
    Count of agent-*.jsonl files in the session's subagents/ directory.
    From query_session_profiles().
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: sessions
  section: timeline
  dynamic_source: true

sessions.timeline.source_files:
  explanation: >
    Number of source code files modified during this session (filtered
    to code file extensions like .py, .js, .ts).
  source: >
    Filtered count from file_modified events for this session, keeping
    only files with known source code extensions.
  source_type: deduced
  unit: count
  update_freq: on-collect
  tab: sessions
  section: timeline
  dynamic_source: true

sessions.timeline.unique_files:
  explanation: >
    Number of unique file paths modified during this session.
  source: >
    Cardinality of unique file paths from file_modified events for
    this session.
  source_type: aggregated
  unit: count
  update_freq: on-collect
  tab: sessions
  section: timeline
  dynamic_source: true

sessions.timeline.bytes_written:
  explanation: >
    Total bytes written during this session across all file modifications.
  source: >
    Sum of growth_bytes from file_modified events for this session.
  source_type: aggregated
  unit: bytes
  update_freq: on-collect
  tab: sessions
  section: timeline
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# SESSION DETAIL EXTRAS (TabSessions.js)
# ═══════════════════════════════════════════════════════════════════

sessions.active.peak_cpu:
  explanation: >
    Peak CPU utilization recorded during this session's lifetime.
  source: >
    SessionState.peak_cpu_percent — maximum cpu_percent value tracked
    via add_cpu() across the session lifetime.
  source_type: raw
  unit: percent
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.traffic:
  explanation: >
    Total network traffic (upload + download bytes) for this session.
  source: >
    SessionState.outbound_bytes + SessionState.inbound_bytes.
    Accumulated from on_network() calls throughout the session.
  source_type: aggregated
  unit: bytes
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.state_writes:
  explanation: >
    Total bytes written to state/session files during this session.
  source: >
    SessionState.state_bytes_written — accumulated growth_bytes from
    file events in state directories.
  source_type: aggregated
  unit: bytes
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.workspaces:
  explanation: >
    List of working directories (project roots) used during this session.
  source: >
    SessionState.workspaces — deduplicated set populated from root
    process cwd and file activity workspace detection.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.subprocesses:
  explanation: >
    Subprocess types spawned during this session with counts (e.g.
    git: 12, rg: 8, bash: 3).
  source: >
    SessionState.subprocess_counter — Counter[str] tracking process
    names spawned as children, accumulated via add_subprocess().
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

sessions.active.files_touched_list:
  explanation: >
    List of file paths modified during this session.
  source: >
    SessionState.files_touched — deduplicated set of file paths from
    add_file_activity() calls.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: sessions
  section: active_session
  dynamic_source: true

