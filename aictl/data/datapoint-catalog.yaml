# MCP SERVERS TAB
# ═══════════════════════════════════════════════════════════════════

mcp.server.name:
  explanation: >
    Name identifier of the MCP server as defined in tool configuration.
  source: >
    Parsed from tool MCP config files (mcpServers key in settings.json,
    .mcp.json, mcp_config.json, etc.).
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: mcp
  section: mcp_table
  dynamic_source: false

mcp.server.tool:
  explanation: >
    Which AI tool this MCP server belongs to (e.g. claude-code, cursor).
  source: >
    Derived from which tool's configuration file contains this server
    definition.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: mcp
  section: mcp_table
  dynamic_source: false

mcp.server.transport:
  explanation: >
    Communication transport used by the MCP server (stdio, sse, http).
  source: >
    From MCP config: command presence → stdio, url with /sse → sse,
    url with /mcp → streamable-http, else http.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: mcp
  section: mcp_table
  dynamic_source: false

mcp.server.status:
  explanation: >
    Running status of the MCP server process. Shows PID if running.
  source: >
    Process matching against MCP server command. For stdio transport,
    matches the command binary in running processes via psutil. Status
    is "running" (with PID) or "configured" (not running).
  source_type: raw
  unit: count
  update_freq: realtime
  tab: mcp
  section: mcp_table
  otel_metric: aictl.mcp.detail.status
  dynamic_source: true

mcp.server.cpu:
  explanation: >
    CPU utilization of the MCP server process (if running).
  source: >
    psutil.Process.cpu_percent() for the matched MCP server PID.
  source_type: raw
  unit: percent
  update_freq: realtime
  tab: mcp
  section: mcp_table
  dynamic_source: true

mcp.server.mem:
  explanation: >
    Memory usage of the MCP server process (if running).
  source: >
    psutil.Process.memory_info().rss for the matched MCP server PID.
  source_type: raw
  unit: bytes
  update_freq: realtime
  tab: mcp
  section: mcp_table
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# AI CONTEXT (MEMORY) TAB
# ═══════════════════════════════════════════════════════════════════

memory.growth_chart:
  explanation: >
    Time series chart showing growth of agent memory tokens over time.
    Tracks how much persistent context AI tools accumulate.
  source: >
    Historical mem_tokens values from the metrics table, plotted as a
    time series. Each point recorded on collection cycle.
  source_type: aggregated
  unit: tokens
  update_freq: on-collect
  tab: memory
  section: memory_growth
  dynamic_source: true

memory.source_group:
  explanation: >
    Memory entries grouped by source (e.g. claude-user-memory,
    copilot-agent-memory). Shows file count and token count per source.
  source: >
    Agent memory files discovered by scanning known memory paths.
    Grouped by the source field from MemoryEntry (derived from path
    structure: ~/.claude/memory/ → claude-user-memory).
  source_type: aggregated
  unit: tokens
  update_freq: on-collect
  tab: memory
  section: memory_sources
  dynamic_source: true

memory.entry.activity:
  explanation: >
    Activity status of a memory file — green (live active, recently
    changed), orange (modified within 5 minutes), grey (inactive).
  source: >
    Based on file mtime comparison: green if changed since last
    collection, orange if mtime within 300s, grey otherwise.
  source_type: deduced
  unit: count
  update_freq: on-collect
  tab: memory
  section: memory_item
  dynamic_source: true

memory.entry.tokens:
  explanation: >
    Estimated token count for a single memory/context file.
  source: >
    ceil(len(content.encode('utf-8')) / 4). The content is read from
    disk on each collection cycle.
  source_type: deduced
  unit: tokens
  update_freq: on-collect
  tab: memory
  section: memory_item
  otel_metric: aictl.memory.tokens
  dynamic_source: false

