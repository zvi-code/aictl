  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: events
  section: tool_live
  dynamic_source: true

events.tool.live.pid_count:
  explanation: >
    Process ID count for the selected tool in the Events & Stats tab.
  source: >
    Same data as procs.tool.live.pid_count — PID set cardinality
    from ToolReport.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: events
  section: tool_live
  dynamic_source: true

events.tool.live.cpu_percent:
  explanation: >
    CPU utilization for the selected tool in the Events & Stats tab.
  source: >
    Sum of cpu_percent across active sessions for this tool.
  source_type: aggregated
  unit: percent
  update_freq: realtime
  tab: events
  section: tool_live
  dynamic_source: true

events.tool.live.mem_mb:
  explanation: >
    Memory usage for the selected tool in the Events & Stats tab.
  source: >
