    collector.
  source: >
    Workspace roots from active session working directories.
    State paths from tool-specific state directory functions
    (e.g. claude_global_dir(), copilot_state_dir()).
  source_type: raw
  unit: count
  update_freq: realtime
  tab: live
  section: monitor_roots
  dynamic_source: true

