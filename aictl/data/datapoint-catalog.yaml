  unit: count
  update_freq: on-collect
  tab: sessions
  section: agent_teams
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# BUDGET EXTRAS (TabBudget.js)
# ═══════════════════════════════════════════════════════════════════

budget.project_estimate:
  explanation: >
    Estimated context window usage for the largest sub-project, plus
    global tokens. Shows realistic total when multiple projects exist.
  source: >
    compute_token_budget() groups files by project root, finds the
    largest sub-project by token sum, adds global (non-project) tokens.
    Fields: largest_project name, largest_project_tokens, global_tokens.
  source_type: deduced
  unit: tokens
  update_freq: on-discovery
  tab: budget
  section: context_window
  dynamic_source: false

budget.model_detected:
  explanation: >
    The AI model detected for context window size estimation. Used to
    calculate what percentage of the model's context window is consumed.
  source: >
    From tool telemetry model field or tool config model setting.
    Determines max context length for percentage calculation.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: budget
  section: context_window
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# API-ONLY ENDPOINTS (not directly displayed in dashboard tabs)
# ═══════════════════════════════════════════════════════════════════

api.project_costs:
  explanation: >
    Per-project cost breakdown — sessions, tokens, and estimated USD
    cost grouped by working directory / repository.
  source: >
    Computed from HistoryDB: session_end events grouped by project
    field, with token totals from telemetry. Daily breakdown from
    tool_telemetry table. Cost from tool-native cost tracking.
  source_type: deduced
  unit: usd
  update_freq: on-collect
  tab: api
  section: project_costs
  dynamic_source: true

api.session_runs:
  explanation: >
    Historical session run data — per-session tokens, duration, project,
    and tool. Used for session analytics and billing.
  source: >
    Query from events table for session_start/session_end event pairs.
    Duration = end_ts - start_ts. Tokens from event detail JSON.
  source_type: raw
  unit: tokens
  update_freq: on-collect
  tab: api
  section: session_runs
  dynamic_source: true

api.api_calls:
  explanation: >
    Individual API call records received via OpenTelemetry — model,
    latency, tokens, errors. Provides per-request visibility.
  source: >
    Aggregated from OTel receiver events matching gen_ai.* span types.
    Each call logged with model, duration_ms, input/output tokens,
    status, and optional error details.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: api
  section: api_calls
  dynamic_source: true

api.file_content:
  explanation: >
    File content retrieval for inline preview in the dashboard.
    Returns raw text content of tracked files.
  source: >
    Direct file read from filesystem via os.open(), limited to 200KB.
    Path must be in the AllowedPaths whitelist (discovered tool files).
  source_type: raw
  unit: bytes
  update_freq: on-collect
  tab: api
  section: file_content
  dynamic_source: false

api.file_history:
  explanation: >
    Historical timeline of file modifications — when files were created,
    modified, or deleted, with content snapshots at change points.
  source: >
    file_history table in DB. Content snapshots stored when content_hash
    changes between collection cycles. Queryable by path and time range.
  source_type: raw
  unit: count
  update_freq: on-collect
  tab: api
  section: file_history
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# OTEL TRACES (from /v1/traces OTLP spans)
# ═══════════════════════════════════════════════════════════════════

otel.traces.token_usage:
  explanation: >
    Token usage extracted from OTLP trace spans. Each span may carry
    gen_ai.usage.input_tokens and gen_ai.usage.output_tokens attributes,
    providing per-request token counts with model attribution.
  source: >
    Parsed from /v1/traces POST. Each span's attributes are scanned for
    gen_ai.usage.input_tokens, gen_ai.usage.output_tokens,
    gen_ai.usage.prompt_tokens, gen_ai.usage.completion_tokens. Mapped
    to otel.token.usage metric with gen_ai.token.type tag (input/output).
  source_type: raw
  unit: tokens
  update_freq: realtime
  tab: overview
  section: collector_health
  otel_metric: otel.token.usage
  dynamic_source: true

otel.traces.operation_duration:
  explanation: >
    Duration of LLM operations extracted from OTLP trace spans. Captures
    inference latency, chat completion time, and API request duration.
  source: >
    Computed from span startTimeUnixNano and endTimeUnixNano for spans
    whose name contains inference, chat, api, request, or completion.
    Duration in seconds stored as otel.operation.duration metric.
  source_type: deduced
  unit: seconds
  update_freq: realtime
  tab: overview
  section: collector_health
  otel_metric: otel.operation.duration
  dynamic_source: true

otel.traces.span_events:
  explanation: >
    Events embedded within OTLP spans — exceptions, prompt content,
    tool invocations. Each span can carry zero or more events with
    their own timestamps and attributes.
  source: >
    Parsed from span.events[] array in /v1/traces POST. Each span event
    becomes an EventRow with kind=otel:{event_name} and parent_span
    reference. Stored in events table.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: events
  section: event_feed
  dynamic_source: true

otel.traces.api_calls:
  explanation: >
    Count of API call spans detected in OTLP traces. Spans whose name
    contains api_request, inference, or chat.completion are counted.
  source: >
    Counter incremented for each span matching API call patterns during
    /v1/traces parsing. Tracked in OtelStats.api_calls_total.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

otel.traces.api_errors:
  explanation: >
    Count of error spans in OTLP traces. Spans with OTLP status code 2
    (ERROR) are counted as API errors.
  source: >
    Counter incremented when span.status.code == 2 during /v1/traces
    parsing. Tracked in OtelStats.api_errors_total.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# OTEL RECEIVER HEALTH (internal counters)
# ═══════════════════════════════════════════════════════════════════

otel.receiver.metrics_received:
  explanation: >
    Total count of metric data points received across all /v1/metrics
    and /v1/traces POST requests since server startup.
  source: >
    OtelStats.metrics_received counter. Incremented by len(samples)
    after each parse_metrics() or parse_traces() call.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

otel.receiver.events_received:
  explanation: >
    Total count of event/log records received across all /v1/logs
    and /v1/traces POST requests since server startup.
  source: >
    OtelStats.events_received counter. Incremented by len(events)
    after each parse_logs() or parse_traces() call.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

otel.receiver.traces_received:
  explanation: >
    Total count of span records received via /v1/traces since startup.
    Each span produces both samples (token/duration metrics) and events.
  source: >
    Sum of samples + events produced by parse_traces(). Not a separate
    counter — derived from metrics_received + events_received for the
    traces endpoint specifically.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

otel.receiver.api_calls_total:
  explanation: >
    Total API calls detected across all OTLP sources (metrics, logs,
    traces). Includes both log-based and span-based API call detection.
  source: >
    OtelStats.api_calls_total counter. Incremented when event name
    matches API_REQUEST_EVENTS set or span name matches API patterns.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

otel.receiver.api_errors_total:
  explanation: >
    Total API errors detected across all OTLP sources. Includes
    log-based errors and span status code 2 (ERROR).
  source: >
    OtelStats.api_errors_total counter. Incremented when event name
    matches API_ERROR_EVENTS set or span has error status.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

otel.receiver.parse_errors:
  explanation: >
    Number of errors encountered while parsing incoming OTLP payloads
    across all three endpoints (metrics, logs, traces).
  source: >
    OtelStats.errors counter. Incremented on JSON parse failures,
    schema validation errors, or unhandled exceptions in any receiver
    handler.
  source_type: raw
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

otel.receiver.last_receive:
  explanation: >
    Timestamp of the last successfully parsed OTLP payload from any
    endpoint. Used to determine receiver freshness.
  source: >
    OtelStats.last_receive_at set to time.time() after any successful
    parse. Active if within 300s. Displayed as relative time.
  source_type: raw
  unit: seconds
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

otel.receiver.active:
  explanation: >
    Whether the OTel receiver has received data recently (within 300s).
    Shown as green/grey badge in Collector Health.
  source: >
    Derived: time.time() - OtelStats.last_receive_at < 300.
  source_type: deduced
  unit: count
  update_freq: realtime
  tab: overview
  section: collector_health
  dynamic_source: true

# ═══════════════════════════════════════════════════════════════════
# AICTL SELF-MONITORING (monitoring service own resources)
# ═══════════════════════════════════════════════════════════════════

self.cpu_percent:
  explanation: >
    CPU utilization of the aictl monitoring service process itself.
    This is NOT an AI tool metric — it shows how much CPU the
    monitoring dashboard consumes.
  source: >
    psutil.Process(os.getpid()).cpu_percent() for the aictl server
    process. Polled via /api/self-status endpoint every 15s.
  source_type: raw
  unit: percent
  update_freq: realtime
  tab: overview
  section: self_monitoring
  dynamic_source: true

self.memory_rss:
  explanation: >
    Resident memory (RSS) consumed by the aictl monitoring service.
    This is the physical RAM footprint of aictl itself, not the
    monitored AI tools.
  source: >
    psutil.Process(os.getpid()).memory_info().rss in bytes.
  source_type: raw
  unit: bytes
  update_freq: realtime
  tab: overview
  section: self_monitoring
  dynamic_source: true

self.db_size:
  explanation: >
    On-disk size of the aictl SQLite history database (history.db).
    Grows as metrics, events, and telemetry are collected over time.
    Compacted automatically (24h full res, 7d 1-min avg, 30d 5-min avg).
  source: >
    os.stat(db_path).st_size for the history.db file. Default location:
    ~/.config/aictl/history.db.
  source_type: raw
  unit: bytes
  update_freq: realtime
  tab: overview
  section: self_monitoring
  dynamic_source: true

self.uptime:
  explanation: >
    How long the aictl monitoring service has been running since
    the last start of 'aictl serve'.
  source: >
    time.time() - psutil.Process(os.getpid()).create_time().
  source_type: deduced
  unit: seconds
  update_freq: realtime
  tab: overview
  section: self_monitoring
  dynamic_source: true

self.threads:
  explanation: >
    Number of threads in the aictl monitoring service. Includes
    DB flush thread, refresh loop, SSE connections, collectors.
  source: >
    psutil.Process(os.getpid()).num_threads().
  source_type: raw
  unit: count
  update_freq: realtime
  tab: overview
  section: self_monitoring
  dynamic_source: true

self.db_rows:
  explanation: >
    Total number of rows across the main data tables in the aictl
    database (metrics + tool_metrics + events + samples).
  source: >
    SUM of SELECT COUNT(*) from metrics, tool_metrics, events,
    samples tables.
  source_type: aggregated
  unit: count
  update_freq: realtime
  tab: overview
  section: self_monitoring
  dynamic_source: true
