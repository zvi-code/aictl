[project]
name = "aictl"
version = "0.4.0"
description = "Scoped, composable, task-aware AI context management"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1",
    "pyyaml>=6.0",
]

[project.scripts]
aictl = "aictl.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
